# xe_fanctl - Fan control daemon configuration for Intel Arc B580
#
# Place this file at /etc/xe_fanctl.conf or pass --config <path> to the daemon.

[general]
# Poll interval in seconds
interval = 2

# Fan control method: auto, kernel, userspace, motherboard
#   auto        - detect in order: kernel > userspace > motherboard
#   kernel      - write to /sys/kernel/xe_fan/pwm1 (requires xe_fan_probe.ko)
#   userspace   - call xe_pcode_probe --write-duty N --force
#   motherboard - write to a motherboard PWM header (physical fan redirect)
method = auto

# Hysteresis in degrees Celsius to prevent rapid fan speed oscillation.
# The fan only spins down when temperature has fallen by this many degrees
# below the point where it last needed to spin up.
hysteresis = 3

# Temperature source: hwmon, kernel
#   hwmon  - /sys/class/hwmon/hwmon2/temp2_input (xe driver hwmon)
#   kernel - /sys/kernel/xe_fan/temp1_input (xe_fan_probe.ko module)
# If the selected source is unavailable the other is tried as fallback.
temp_source = hwmon

# Log level: debug, info, warning, error
log_level = info

[curve]
# Temperature in degrees Celsius = PWM duty cycle (0-255)
# The daemon linearly interpolates between adjacent points.
# Below the lowest point the lowest PWM is used.
# Above the highest point the highest PWM is used.
30 = 0
40 = 80
50 = 120
60 = 160
70 = 200
80 = 255

[motherboard]
# Motherboard PWM header for physical fan redirect fallback.
# The it8689 Super I/O on the GIGABYTE B550M exposes pwm1-pwm5.
# Adjust these values to match the header the GPU fan is connected to.
pwm_device = hwmon3
pwm_channel = 3
fan_device = hwmon3
fan_channel = 3

[userspace]
# Path to the xe_pcode_probe userspace PCODE mailbox tool.
# Leave commented to use ../userspace/xe_pcode_probe relative to this daemon.
# tool_path = /usr/local/bin/xe_pcode_probe

# FAN_SPEED_CONTROL write subcommand to use.
#   auto - auto-detect from /sys/kernel/xe_fan/write_subcmd if kernel
#          module is loaded, otherwise let the tool probe all subcommands.
#   N    - use a specific subcommand number (decimal or 0x-prefixed hex).
write_subcmd = auto
